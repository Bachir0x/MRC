<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dodge - Simple Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        height: 100vh;
        background: #0a0015;
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
        color: #e0f0ff;
    }
    canvas {
        display: block;
    }
    #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        user-select: none;
    }
    #score {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 42px;
        font-weight: bold;
        text-shadow: 0 0 12px #4488ff;
    }
    #gameover {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ff6666;
        font-size: 60px;
        font-weight: bold;
        text-shadow: 0 0 20px #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s;
    }
    #gameover.show {
        opacity: 1;
        pointer-events: all;
    }
    #restart {
        margin-top: 40px;
        padding: 16px 48px;
        font-size: 24px;
        background: transparent;
        color: #88aaff;
        border: 3px solid #88aaff;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }
    #restart:hover {
        background: #88aaff;
        color: #000;
    }
    #instructions {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        opacity: 0.7;
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="ui">
    <div id="score">0</div>
</div>

<div id="gameover">
    <div>GAME OVER</div>
    <div id="finalscore" style="font-size:38px; margin:20px 0; color:#aaccff"></div>
    <button id="restart">PLAY AGAIN</button>
</div>

<div id="instructions">← → or A D or touch left/right side</div>

<canvas id="c"></canvas>

<script>
// ────────────────────────────────────────────────
//  DODGE – very simple endless avoider game
// ────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let score = 0;
let gameActive = false;
let lastTime = 0;

const player = {
    x: 0,
    y: 0,
    w: 50,
    h: 70,
    speed: 380
};

const obstacles = [];
let nextObstacleTime = 0;

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

// Touch support — left/right side of screen
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!gameActive) return;
    const touchX = e.touches[0].clientX;
    player.targetX = touchX < W/2 ? 80 : W - 80;
});
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    player.targetX = null;
});

function resetGame() {
    score = 0;
    player.x = W/2;
    player.y = H - 140;
    player.targetX = null;
    obstacles.length = 0;
    nextObstacleTime = 0;
    gameActive = true;
    document.getElementById('gameover').classList.remove('show');
    document.getElementById('score').textContent = "0";
}

function spawnObstacle() {
    const size = 50 + Math.random() * 40;
    const x = 40 + Math.random() * (W - 80);
    obstacles.push({
        x: x,
        y: -size,
        w: size,
        h: size,
        speed: 180 + score * 0.8
    });
}

function update(dt) {
    if (!gameActive) return;

    score += dt * 12;
    document.getElementById('score').textContent = Math.floor(score);

    // Player movement
    let dx = 0;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;

    if (player.targetX !== null) {
        const diff = player.targetX - player.x;
        dx = Math.sign(diff) * 1.2;
    }

    player.x += dx * player.speed * dt;
    player.x = Math.max(40, Math.min(W - 40, player.x));

    // Spawn obstacles
    nextObstacleTime -= dt;
    if (nextObstacleTime <= 0) {
        spawnObstacle();
        nextObstacleTime = 1.1 - Math.min(score / 400, 0.7);
    }

    // Move & check obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.y += o.speed * dt;

        // Collision
        if (
            player.x + player.w/2 > o.x - o.w/2 &&
            player.x - player.w/2 < o.x + o.w/2 &&
            player.y + player.h/2 > o.y - o.h/2 &&
            player.y - player.h/2 < o.y + o.h/2
        ) {
            gameActive = false;
            const final = Math.floor(score);
            document.getElementById('finalscore').textContent = `Score: ${final}`;
            document.getElementById('gameover').classList.add('show');
        }

        // Remove when off screen
        if (o.y > H + o.h) {
            obstacles.splice(i, 1);
        }
    }
}

function draw() {
    ctx.fillStyle = "#0a0015";
    ctx.fillRect(0, 0, W, H);

    // Stars background
    ctx.fillStyle = "#ffffff";
    for (let i = 0; i < 80; i++) {
        const x = (Math.sin(i * 7.3) * W * 0.4 + W/2 + Date.now() * 0.0003 * (i+10)) % W;
        const y = (Math.cos(i * 11.1) * H * 0.4 + H/2 + Date.now() * 0.0004 * (i+30)) % H;
        const size = 1.2 + Math.sin(Date.now() * 0.001 + i) * 0.6;
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.0015 + i * 2) * 0.6;
        ctx.fillRect(x, y, size, size);
    }
    ctx.globalAlpha = 1;

    // Player ship
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = "#88ccff";
    ctx.beginPath();
    ctx.moveTo(0, -player.h/2);
    ctx.lineTo(-player.w/2, player.h/2);
    ctx.lineTo(player.w/2, player.h/2);
    ctx.closePath();
    ctx.fill();

    // Glow
    ctx.shadowColor = "#4488ff";
    ctx.shadowBlur = 25;
    ctx.fillStyle = "rgba(68,136,255,0.4)";
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();

    // Obstacles
    for (const o of obstacles) {
        ctx.fillStyle = "#ff4444";
        ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);

        // Glow
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = 15;
        ctx.fillStyle = "rgba(255,60,60,0.35)";
        ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
        ctx.shadowBlur = 0;
    }
}

function gameLoop(time = 0) {
    const dt = Math.min((time - lastTime) / 1000, 0.1);
    lastTime = time;

    update(dt);
    draw();

    requestAnimationFrame(gameLoop);
}

// Start / restart
document.getElementById('restart').onclick = () => {
    resetGame();
    gameActive = true;
};

document.body.onclick = () => {
    if (!gameActive) {
        resetGame();
    }
};

resetGame();
gameLoop();
</script>
</body>
</html>
