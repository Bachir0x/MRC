<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIGHWAY HEAT | Ultra Racer</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #container {
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #222;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .hud-text {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        #speed-kmh { color: #ffcc00; }
        #score-num { color: #00ffcc; }
        
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        h1 { font-size: 60px; margin: 0; color: #ff3300; letter-spacing: -2px; }
        p { font-size: 18px; color: #aaa; margin-bottom: 30px; }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background: #ff3300;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); background: #ff4411; }
    </style>
</head>
<body>

<div id="container">
    <div id="ui">
        <div class="hud-text">SPEED: <span id="speed-kmh">0</span> KM/H</div>
        <div class="hud-text">SCORE: <span id="score-num">0</span></div>
    </div>

    <div id="overlay">
        <h1>HIGHWAY HEAT</h1>
        <p>W,A,S,D to Drive. Dodge Traffic.</p>
        <button onclick="startGame()">START ENGINE</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const speedEl = document.getElementById('speed-kmh');
    const scoreEl = document.getElementById('score-num');
    const overlay = document.getElementById('overlay');

    canvas.width = 480;
    canvas.height = 700;

    // Game State
    let gameActive = false;
    let score = 0;
    let speed = 0;
    let worldY = 0;
    let shake = 0;

    const player = {
        x: canvas.width / 2,
        y: canvas.height - 150,
        w: 50,
        h: 90,
        angle: 0,
        targetAngle: 0,
        velX: 0,
        color: '#ff3300'
    };

    let enemies = [];
    let particles = [];
    let keys = {};

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function drawCar(x, y, angle, color, isPlayer = false) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-player.w/2 + 5, -player.h/2 + 5, player.w, player.h);

        // Body
        ctx.fillStyle = color;
        // Draw main chassis with rounded corners
        drawRoundedRect(ctx, -player.w/2, -player.h/2, player.w, player.h, 10);
        ctx.fill();

        // Roof / Windshield
        ctx.fillStyle = '#111';
        ctx.fillRect(-player.w/2 + 5, -15, player.w - 10, 35);
        
        // Highlights (Reflection)
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(-player.w/2 + 8, -10, 10, 25);

        // Headlights
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'white';
        ctx.fillStyle = '#fff';
        ctx.fillRect(-player.w/2 + 5, -player.h/2, 12, 8);
        ctx.fillRect(player.w/2 - 17, -player.h/2, 12, 8);

        // Tail lights
        if (isPlayer && keys['KeyS']) {
            ctx.shadowColor = 'red';
            ctx.fillStyle = '#ff0000';
        } else {
            ctx.fillStyle = '#550000';
        }
        ctx.fillRect(-player.w/2 + 5, player.h/2 - 5, 12, 5);
        ctx.fillRect(player.w/2 - 17, player.h/2 - 5, 12, 5);

        ctx.restore();
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function spawnEnemy() {
        const lanes = [80, 185, 290, 395];
        const lane = lanes[Math.floor(Math.random() * lanes.length)];
        const colors = ['#3366ff', '#ffffff', '#444444', '#ccaa00'];
        
        enemies.push({
            x: lane,
            y: -150,
            speed: 2 + Math.random() * 3,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }

    function createExplosion(x, y) {
        for(let i=0; i<20; i++) {
            particles.push({
                x, y,
                vx: (Math.random()-0.5)*10,
                vy: (Math.random()-0.5)*10,
                life: 1,
                color: '#ff6600'
            });
        }
    }

    function update() {
        if (!gameActive) return;

        // Drive Logic
        if (keys['KeyW'] || keys['ArrowUp']) speed = Math.min(speed + 0.15, 15);
        else speed = Math.max(speed - 0.1, 0);

        if (keys['KeyA'] || keys['ArrowLeft']) {
            player.velX -= 0.8;
            player.targetAngle = -0.15;
        } else if (keys['KeyD'] || keys['ArrowRight']) {
            player.velX += 0.8;
            player.targetAngle = 0.15;
        } else {
            player.targetAngle = 0;
        }

        // Physics
        player.x += player.velX;
        player.velX *= 0.9; // Friction
        player.angle += (player.targetAngle - player.angle) * 0.1;

        // Boundary
        if (player.x < 50 || player.x > canvas.width - 50) {
            speed *= 0.9;
            shake = 5;
        }
        player.x = Math.max(40, Math.min(canvas.width - 40, player.x));

        // World Scrolling
        worldY += speed;
        score += Math.floor(speed / 5);

        // Enemies
        if (Math.random() < 0.02) spawnEnemy();
        
        enemies.forEach((en, index) => {
            en.y += speed - en.speed;
            if (en.y > canvas.height + 100) enemies.splice(index, 1);

            // Collision Detection
            const dist = Math.hypot(player.x - en.x, player.y - en.y);
            if (dist < 60) {
                gameOver();
            }
        });

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });

        // UI
        speedEl.innerText = Math.floor(speed * 20);
        scoreEl.innerText = score;
        if (shake > 0) shake *= 0.9;
    }

    function draw() {
        ctx.save();
        // Screen Shake
        if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

        // Draw Road
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Road Lines
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 4;
        for(let i=0; i<5; i++) {
            ctx.beginPath();
            ctx.moveTo(i * 106, 0);
            ctx.lineTo(i * 106, canvas.height);
            ctx.stroke();
        }

        // Center dashed lines
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([40, 40]);
        ctx.lineDashOffset = -worldY;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, 0);
        ctx.lineTo(canvas.width/2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw Enemies
        enemies.forEach(en => {
            drawCar(en.x, en.y, Math.PI, en.color);
        });

        // Draw Player
        drawCar(player.x, player.y, player.angle, player.color, true);

        // Draw Particles
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1;

        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        overlay.style.display = 'none';
        gameActive = true;
        score = 0;
        speed = 0;
        enemies = [];
        player.x = canvas.width / 2;
    }

    function gameOver() {
        gameActive = false;
        createExplosion(player.x, player.y);
        shake = 20;
        setTimeout(() => {
            overlay.style.display = 'flex';
            document.querySelector('h1').innerText = "WRECKED!";
            document.querySelector('button').innerText = "REPAIR & RETRY";
        }, 1000);
    }

    gameLoop();
</script>
</body>
</html>
